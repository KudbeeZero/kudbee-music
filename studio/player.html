<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family:'Anton';   src:url('fonts/Anton.woff2')   format('woff2'); }
  @font-face { font-family:'Oswald';  src:url('fonts/Oswald.woff2')  format('woff2'); font-weight:600; }
  @font-face { font-family:'Archivo'; src:url('fonts/Archivo.woff2') format('woff2'); font-weight:800; }
  html,body{margin:0;padding:0;background:#000;overflow:hidden}
  #c{display:block;position:absolute;left:0;top:0}
</style>
</head>
<body>
<canvas id="c" width="1920" height="1080"></canvas>
<script>
let W=1920, H=1080;
const cv=document.getElementById('c');
const ctx=cv.getContext('2d',{alpha:false});
let A=null, C=null, S=null;       // analysis, config, syncMap
const heroCache=new Map();        // id -> HTMLImageElement
let curHero=null;                 // {img,id}

// ---------- palette ----------
let PACK='neo-noir';
let GRADE=1;   // brain dominance dial: split-tone intensity (1 = balanced)
let PAL={
  bg0:'#070611', bg1:'#0d0a1e',
  amber:'#ffb14e', amber2:'#ff8a3d', glow:'#ffd9a0',
  violet:'#7a3cff', magenta:'#c64bff', deep:'#3a1d6e',
  ink:'#f3ecff', lyricGlow:'rgba(255,150,70,0.95)'
};
const PAL_RETRO={
  bg0:'#1a0033', bg1:'#2d004d',
  amber:'#ff2e88', amber2:'#ff6ac1', glow:'#21d4fd',
  violet:'#7a3cff', magenta:'#ff2e88', deep:'#3d0a5e',
  ink:'#ffffff', lyricGlow:'rgba(33,212,253,0.95)'
};
// faded analog tape — warm cream + teal with a magenta bleed
const PAL_VHS={
  bg0:'#13201f', bg1:'#1d3330',
  amber:'#f4d9a0', amber2:'#e8b27a', glow:'#7fe3d4',
  violet:'#3a8f86', magenta:'#ff5b7f', deep:'#0e1a19',
  ink:'#f2efe2', lyricGlow:'rgba(127,227,212,0.9)'
};
// type-forward minimal — near-black canvas, one warm accent, lots of air
const PAL_MIN={
  bg0:'#0c0c0e', bg1:'#141417',
  amber:'#f5f3ee', amber2:'#cfcdc7', glow:'#ffffff',
  violet:'#e9603e', magenta:'#e9603e', deep:'#000000',
  ink:'#f5f3ee', lyricGlow:'rgba(233,96,62,0.85)'
};

// ---------- deterministic noise ----------
function hash(x,y,s){let h=x*374761393+y*668265263+s*2246822519;h=(h^(h>>13))*1274126177;return ((h^(h>>16))>>>0)/4294967295;}
// pre-rendered grain tiles
const GRAIN=[]; const GT=256;
(function(){for(let k=0;k<6;k++){const o=document.createElement('canvas');o.width=GT;o.height=GT;const g=o.getContext('2d');const im=g.createImageData(GT,GT);for(let i=0;i<im.data.length;i+=4){const v=180+Math.floor(hash((i/4)%GT,(i/4/GT)|0,k+1)*75);im.data[i]=im.data[i+1]=im.data[i+2]=v;im.data[i+3]=255;}g.putImageData(im,0,0);GRAIN.push(o);} })();

function lerp(a,b,t){return a+(b-a)*t;}
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function clamp(v,a,b){return v<a?a:v>b?b:v;}

// ---------- background: hero image, cover-fit with optional drift/scale ----------
function drawCover(img, scale, dx, dy){
  const ir=img.width/img.height, cr=W/H;
  let w,h; if(ir>cr){h=H*scale;w=h*ir;}else{w=W*scale;h=w/ir;}
  ctx.drawImage(img,(W-w)/2+dx,(H-h)/2+dy,w,h);
}

// ---------- procedural scenes ----------
function sceneNeon(t,f,loud){
  // receding neon arches toward a vanishing point (echoes the reference still)
  const g=ctx.createRadialGradient(W/2,H*0.52,40,W/2,H*0.52,H*0.9);
  g.addColorStop(0,'#2a1550'); g.addColorStop(.5,PAL.bg1); g.addColorStop(1,PAL.bg0);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const vx=W/2, vy=H*0.5, N=16, drift=(t*0.35)%1;
  for(let i=N;i>=1;i--){
    const p=(i-drift)/N;                 // 0 near vanish .. 1 near camera
    const s=Math.pow(p,1.7);
    const aw=lerp(60,W*1.15,s), ah=lerp(40,H*1.25,s);
    const x=vx-aw/2, y=vy-ah*0.62;
    const glow=clamp(0.20+0.8*(1-p)+loud*0.4,0,1);
    ctx.lineWidth=clamp(2+s*10,2,14);
    ctx.strokeStyle=`rgba(255,${150+80*(1-p)|0},${90+40*Math.sin(t+i)|0},${0.10+0.5*glow})`;
    roundArch(x,y,aw,ah);
    ctx.stroke();
    // warm bulb at apex
    const by=y, bx=vx;
    bulb(bx,by,clamp(3+s*9,3,12),glow);
  }
  fog(loud);
}
function roundArch(x,y,w,h){
  const r=Math.min(w/2,h*0.6);
  ctx.beginPath();
  ctx.moveTo(x,y+h);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h);
}
function bulb(x,y,r,a){
  const g=ctx.createRadialGradient(x,y,0,x,y,r*4);
  g.addColorStop(0,`rgba(255,228,170,${0.9*a})`);
  g.addColorStop(.4,`rgba(255,150,70,${0.5*a})`);
  g.addColorStop(1,'rgba(255,120,50,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*4,0,7); ctx.fill();
}
function fog(loud){
  ctx.save(); ctx.globalCompositeOperation='screen';
  const g=ctx.createRadialGradient(W/2,H*0.5,0,W/2,H*0.5,W*0.5);
  g.addColorStop(0,`rgba(170,90,255,${0.10+loud*0.12})`); g.addColorStop(1,'rgba(170,90,255,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.restore();
}

function sceneVortex(t,f,loud){
  ctx.fillStyle=PAL.bg0; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.translate(W/2,H/2);
  const rot=t*1.1; const rings=26;
  ctx.globalCompositeOperation='screen';
  for(let i=rings;i>=1;i--){
    const p=i/rings; const rad=Math.pow(p,1.6)*W*0.75*(1+loud*0.15);
    ctx.save(); ctx.rotate(rot*(1-p*0.5)+i*0.3);
    ctx.lineWidth=lerp(1,9,1-p);
    const r=lerp(255,198,p)|0, gg=lerp(150,75,p)|0, b=lerp(70,255,p)|0;
    ctx.strokeStyle=`rgba(${r},${gg},${b},${0.12+0.45*(1-p)})`;
    ctx.beginPath();
    for(let a=0;a<=6.3;a+=0.35){const rr=rad*(1+0.06*Math.sin(a*5+t*2));ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}
    ctx.closePath(); ctx.stroke(); ctx.restore();
  }
  // center light
  const g=ctx.createRadialGradient(0,0,0,0,0,180+loud*120);
  g.addColorStop(0,'rgba(255,225,170,0.95)'); g.addColorStop(.5,'rgba(255,140,70,0.4)'); g.addColorStop(1,'rgba(255,140,70,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,320,0,7); ctx.fill();
  ctx.restore();
}

function sceneBridge(t,f,loud){
  // warped hallway: vertical light bars with sine warp
  ctx.fillStyle=PAL.bg1; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalCompositeOperation='screen';
  const vy=H*0.5;
  for(let i=-10;i<=10;i++){
    const basex=W/2+i*120; ctx.beginPath();
    for(let y=0;y<=H;y+=14){
      const persp=1-Math.abs(y-vy)/H*0.5;
      const warp=Math.sin(y*0.012+t*1.3+i*0.6)*40*persp;
      const x=W/2+(basex-W/2)*persp+warp;
      if(y===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    const a=0.05+0.25*Math.max(0,1-Math.abs(i)/8)+loud*0.15;
    ctx.lineWidth=3; ctx.strokeStyle=`rgba(${180+i*4},120,255,${a})`; ctx.stroke();
  }
  ctx.restore(); fog(loud*0.6);
}

function sceneGlitchOver(t,f,loud){
  // expects a background already drawn; apply slice + rgb split
  const slices=10+((loud*14)|0);
  const img=ctx.getImageData(0,0,W,H);
  // rgb split: redraw shifted channels via temp canvas
  const tmp=document.createElement('canvas');tmp.width=W;tmp.height=H;const tg=tmp.getContext('2d');
  tg.putImageData(img,0,0);
  ctx.fillStyle='#05040c'; ctx.fillRect(0,0,W,H);
  const sh=14+loud*40;
  ctx.globalCompositeOperation='screen';
  ctx.globalAlpha=0.9; ctx.drawImage(tmp,-sh,0); // reddish
  ctx.fillStyle='rgba(255,40,80,0.0)';
  ctx.globalAlpha=0.8; ctx.drawImage(tmp,sh,0);
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  // horizontal slice tears
  for(let s=0;s<slices;s++){
    const yy=(hash(s,f,3)*H)|0, hh=8+(hash(s,f,4)*40|0), off=(hash(s,f,5)-0.5)*120*(0.4+loud);
    ctx.drawImage(tmp,0,yy,W,hh,off,yy,W,hh);
  }
  // scanlines
  ctx.globalAlpha=0.10; ctx.fillStyle='#000';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,2);
  ctx.globalAlpha=1;
}

function sceneOutroPost(t,f,localT,dur){
  // tape-rewind: reverse scanlines sweeping + jitter (called as overlay)
  ctx.save();
  const sweep=((1-(localT/dur))*H*2)%H;
  ctx.globalCompositeOperation='screen';
  ctx.fillStyle='rgba(255,200,150,0.05)';
  for(let y=sweep-60;y<sweep+60;y+=3) ctx.fillRect(0,y,W,1);
  ctx.restore();
}

// ---------- color grade + grain + vignette (post) ----------
function grade(loud){
  ctx.save();
  // amber highlights
  ctx.globalCompositeOperation='soft-light';
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'rgba(255,150,60,'+(0.35*GRADE).toFixed(3)+')'); g.addColorStop(1,'rgba(120,60,255,'+(0.30*GRADE).toFixed(3)+')');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.restore();
}
function grain(f){
  ctx.save(); ctx.globalCompositeOperation='overlay'; ctx.globalAlpha=0.06;
  const g=GRAIN[f%GRAIN.length]; const ox=(hash(f,1,7)*GT)|0, oy=(hash(f,2,8)*GT)|0;
  for(let x=-ox;x<W;x+=GT)for(let y=-oy;y<H;y+=GT)ctx.drawImage(g,x,y);
  ctx.restore();
}
function vignette(){
  const g=ctx.createRadialGradient(W/2,H*0.5,H*0.35,W/2,H*0.55,W*0.72);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.82)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

// ---------- typography ----------
function fitFont(family,text,max,start){let s=start;ctx.font=`${s}px ${family}`;while(ctx.measureText(text).width>max&&s>16){s-=2;ctx.font=`${s}px ${family}`;}return s;}
// wrap text into <=maxLines, shrinking size until each line fits maxW
function layoutLines(text,family,maxW,startSize,maxLines){
  for(let s=startSize;s>=24;s-=2){
    ctx.font=`${s}px ${family}`;
    const words=text.split(' '); const lines=[]; let cur='';
    for(const w of words){ const test=cur?cur+' '+w:w; if(ctx.measureText(test).width<=maxW) cur=test; else { if(cur)lines.push(cur); cur=w; } }
    if(cur)lines.push(cur);
    if(lines.length<=maxLines && lines.every(l=>ctx.measureText(l).width<=maxW)) return {size:s,lines};
  }
  ctx.font=`24px ${family}`; return {size:24,lines:[text]};
}
function drawLyric(line,t){
  const inT=t-line.start, total=line.end-line.start, p=clamp(inT/total,0,1);
  const appear=clamp(inT/0.4,0,1), disappear=clamp((line.end-t)/0.35,0,1);
  const a=Math.min(appear,disappear); if(a<=0) return;
  const big=line.big;
  const family=big?'Anton':'Oswald';
  const text=big?line.text.toUpperCase():line.text;
  const maxW=W*(big?0.84:0.80);
  const {size,lines}=layoutLines(text,family,maxW,big?134:78,big?3:2);
  ctx.font=`${size}px ${family}`;
  const lh=size*(big?1.04:1.16);
  const blockH=lines.length*lh;
  const cy=big?H*0.50:H*0.80;
  const yTop=cy-blockH/2+lh/2;
  // legibility scrim
  ctx.save();
  const scrimH=blockH+(big?170:96);
  const sg=ctx.createLinearGradient(0,cy-scrimH/2,0,cy+scrimH/2);
  sg.addColorStop(0,'rgba(5,4,12,0)'); sg.addColorStop(0.5,`rgba(5,4,12,${0.5*a})`); sg.addColorStop(1,'rgba(5,4,12,0)');
  ctx.fillStyle=sg; ctx.fillRect(0,cy-scrimH/2,W,scrimH); ctx.restore();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const totalWords=lines.reduce((n,l)=>n+l.split(' ').length,0);
  const revealEdge=clamp(p*1.05,0,1)*totalWords;
  let wIndex=0;
  for(let li=0;li<lines.length;li++){
    const words=lines[li].split(' ');
    const wWid=words.map(w=>ctx.measureText(w).width);
    const sp=ctx.measureText(' ').width;
    let tot=wWid.reduce((s,w)=>s+w+sp,0)-sp;
    let x=W/2-tot/2; const y=yTop+li*lh;
    for(let i=0;i<words.length;i++){
      const wp=clamp(revealEdge-wIndex,0,1);
      const wa=a*clamp(wp*1.8,0,1);
      const rise=(1-ease(clamp(wp,0,1)))*(big?24:16);
      if(wa>0.01){
        ctx.save(); ctx.globalAlpha=wa;
        ctx.shadowColor=PAL.lyricGlow; ctx.shadowBlur=big?30:15;
        ctx.fillStyle=big?'#ffe7c4':'#ffffff';
        ctx.fillText(words[i],x+wWid[i]/2,y+rise);
        ctx.shadowBlur=0; ctx.fillStyle=big?'#fff6e8':'#ffffff';
        ctx.fillText(words[i],x+wWid[i]/2,y+rise);
        ctx.restore();
      }
      x+=wWid[i]+sp; wIndex++;
    }
  }
}
function drawStudioIntro(t,localT){
  const END=4.9;
  const a=clamp(Math.min(localT/0.8,(END-localT)/0.7),0,1);
  if(a<=0) return;
  // cinematic dark scrim over the footage
  ctx.save();
  ctx.fillStyle='rgba(4,3,10,'+(0.66*clamp(a*1.4,0,1)).toFixed(3)+')'; ctx.fillRect(0,0,W,H);
  ctx.restore();
  const cy=H*0.45;
  const grow=ease(clamp(localT/1.3,0,1));
  // expanding anamorphic light streak + bloom behind the name
  ctx.save(); ctx.globalCompositeOperation='screen';
  let lg=ctx.createLinearGradient(W/2-grow*W*0.6,0,W/2+grow*W*0.6,0);
  lg.addColorStop(0,'rgba(255,150,70,0)'); lg.addColorStop(.5,'rgba(255,205,140,'+(0.55*a).toFixed(3)+')'); lg.addColorStop(1,'rgba(255,150,70,0)');
  ctx.fillStyle=lg; ctx.fillRect(0,cy-3,W,6);
  const rg=ctx.createRadialGradient(W/2,cy,0,W/2,cy,W*0.55*grow+1);
  rg.addColorStop(0,'rgba(255,175,95,'+(0.20*a).toFixed(3)+')'); rg.addColorStop(1,'rgba(255,175,95,0)');
  ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
  // floating dust sparkles
  for(let i=0;i<44;i++){const x=hash(i,7,11)*W, y=hash(i,9,13)*H; const tw=0.5+0.5*Math.sin(t*2.0+i*1.7); const r=1+hash(i,3,5)*2.2; ctx.fillStyle='rgba(255,222,175,'+(0.22*a*tw).toFixed(3)+')'; ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();}
  ctx.restore();
  // KUDBEE STUDIOS wordmark
  ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
  const scale=lerp(1.07,1.0,ease(clamp(localT/1.6,0,1)));
  const name='KUDBEE STUDIOS';
  let sz=fitFont('Anton',name,W*0.66,118)*scale;
  ctx.font=sz+'px Anton'; ctx.globalAlpha=a;
  ctx.shadowColor='rgba(255,150,70,0.9)'; ctx.shadowBlur=42; ctx.fillStyle=PAL.glow; ctx.fillText(name,W/2,cy);
  ctx.shadowBlur=0; ctx.globalAlpha=a*0.92; ctx.fillStyle='#fff4e2'; ctx.fillText(name,W/2,cy);
  // moving specular shimmer across the letters
  ctx.globalCompositeOperation='overlay'; ctx.globalAlpha=1;
  const sx=lerp(W*0.18,W*0.82,(localT*0.55)%1);
  const sg=ctx.createRadialGradient(sx,cy,0,sx,cy,300); sg.addColorStop(0,'rgba(255,255,255,'+(0.45*a).toFixed(3)+')'); sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg; ctx.fillRect(0,cy-sz*0.65,W,sz*1.3);
  ctx.restore();
  // hairline rules flanking the handle
  const ha=clamp((localT-0.7)/0.8,0,1)*a;
  if(ha>0){
    ctx.save(); ctx.globalAlpha=ha; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=PAL.amber; ctx.shadowColor='rgba(255,150,70,0.7)'; ctx.shadowBlur=14;
    ctx.font='28px Oswald'; ctx.fillText('@ k u d b e e X', W/2, cy+sz*0.66);
    ctx.shadowBlur=0; ctx.strokeStyle='rgba(255,177,78,'+(0.5*ha).toFixed(3)+')'; ctx.lineWidth=2;
    const hw=ctx.measureText('@ k u d b e e X').width;
    ctx.beginPath(); ctx.moveTo(W/2-hw/2-70,cy+sz*0.66); ctx.lineTo(W/2-hw/2-24,cy+sz*0.66); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W/2+hw/2+24,cy+sz*0.66); ctx.lineTo(W/2+hw/2+70,cy+sz*0.66); ctx.stroke();
    ctx.restore();
  }
  // closing lens flare that blooms into the title
  const fl=clamp((localT-3.7)/0.7,0,1)*clamp((END-localT)/0.6,0,1);
  if(fl>0){ ctx.save(); ctx.globalCompositeOperation='screen'; const fg=ctx.createRadialGradient(W/2,cy,0,W/2,cy,W*0.62); fg.addColorStop(0,'rgba(255,224,176,'+(0.75*fl).toFixed(3)+')'); fg.addColorStop(1,'rgba(255,224,176,0)'); ctx.fillStyle=fg; ctx.fillRect(0,0,W,H); ctx.restore(); }
}

function drawTitle(t,localT,dur){
  const a=clamp((localT-5.0)/1.2,0,1)*clamp((dur-localT)/1.5,0,1);
  if(a<=0)return;
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center';
  ctx.shadowColor='rgba(255,150,70,0.8)'; ctx.shadowBlur=28;
  ctx.fillStyle=PAL.amber; ctx.font='38px Oswald'; ctx.textBaseline='alphabetic';
  ctx.fillText('P R E S E N T S', W/2, H*0.40);
  const sz=fitFont('Anton','DOM SHADY',W*0.8,150);
  ctx.fillStyle=PAL.glow; ctx.font=`${sz}px Anton`;
  ctx.fillText('DOM SHADY', W/2, H*0.55);
  ctx.shadowBlur=10; ctx.fillStyle=PAL.ink; ctx.font='34px Oswald';
  ctx.fillText('Stay There × Fuck Em × Poverty Porn', W/2, H*0.64);
  ctx.restore();
}
function drawCredits(t,localT,dur){
  const lines=['DOM SHADY','','Written & Produced by','kudbee','','Mashup','Stay There × Fuck Em × Poverty Porn','','Visuals','Hermes Studio','','© kudbee'];
  const a=clamp(localT/1.5,0,1);
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.textBaseline='middle';
  const startY=H+40, speed=46; let y=startY-localT*speed;
  for(let i=0;i<lines.length;i++){
    const ly=y+i*52; const big=i===0;
    ctx.fillStyle=big?PAL.amber:PAL.ink; ctx.shadowColor='rgba(255,150,70,0.6)';ctx.shadowBlur=big?22:8;
    ctx.font=big?'64px Anton':'30px Oswald';
    ctx.fillText(lines[i],W/2,ly);
  }
  ctx.restore();
}

// ---------- main frame ----------
function sectionAt(t){let cur=C.sections[0];for(const s of C.sections){if(t>=s.start)cur=s;}return cur;}

// ---------- retrowave scene pack (procedural synthwave) ----------
function sceneRetrowave(t,f,loud){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a0033'); g.addColorStop(0.5,'#3d0a5e'); g.addColorStop(0.6,'#ff2e88'); g.addColorStop(0.68,'#ff6ac1'); g.addColorStop(1,'#2d004d');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const hy=H*0.6, cx=W/2, sr=Math.min(W,H)*0.22;
  // stars
  ctx.save(); ctx.globalCompositeOperation='screen';
  for(let i=0;i<80;i++){const x=hash(i,1,2)*W, y=hash(i,3,4)*hy*0.9; const tw=0.4+0.6*Math.sin(t*1.5+i); ctx.fillStyle='rgba(255,255,255,'+(0.5*tw).toFixed(2)+')'; ctx.fillRect(x,y,2,2);}
  ctx.restore();
  // banded sun
  ctx.save();
  const sg=ctx.createLinearGradient(0,hy-sr,0,hy+sr); sg.addColorStop(0,'#ffe24a'); sg.addColorStop(0.5,'#ff7b3d'); sg.addColorStop(1,'#ff2e88');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(cx,hy,sr,0,7); ctx.fill();
  ctx.globalCompositeOperation='destination-out';
  for(let i=0;i<7;i++){const by=hy - sr*0.05 + i*(sr*0.17); ctx.fillStyle='#000'; ctx.fillRect(cx-sr,by,sr*2,Math.max(2,i*1.7));}
  ctx.restore();
  // grid floor
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.strokeStyle='rgba(33,212,253,0.55)'; ctx.lineWidth=2;
  const scroll=(t*0.4)%1;
  for(let i=0;i<18;i++){ const p=(i+scroll)/18; const y=hy+Math.pow(p,2)*(H-hy); ctx.globalAlpha=0.12+0.5*(1-p); ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  ctx.globalAlpha=0.4;
  for(let i=-12;i<=12;i++){ const fx=cx+i*(W*0.085); ctx.beginPath(); ctx.moveTo(cx,hy); ctx.lineTo(cx+(fx-cx)*6,H); ctx.stroke(); }
  ctx.restore();
  // beat glow
  ctx.save(); ctx.globalCompositeOperation='screen'; const gg=ctx.createRadialGradient(cx,hy,0,cx,hy,W*0.5);
  gg.addColorStop(0,'rgba(255,46,136,'+(0.12+loud*0.2).toFixed(3)+')'); gg.addColorStop(1,'rgba(255,46,136,0)'); ctx.fillStyle=gg; ctx.fillRect(0,0,W,H); ctx.restore();
}
function gradeRetro(){ ctx.save(); ctx.globalAlpha=0.08; ctx.fillStyle='#000'; for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,2); ctx.restore(); }

// ---------- pack: vhs-lofi (warm analog tape) ----------
function sceneVhsLofi(t,f,loud){
  // washed warm gradient base
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,PAL_VHS.bg1); g.addColorStop(0.55,PAL_VHS.bg0); g.addColorStop(1,'#0a1413');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // slow drifting soft light blooms (like tape phosphor)
  ctx.save(); ctx.globalCompositeOperation='screen';
  for(let i=0;i<3;i++){
    const cx=W*(0.3+0.4*Math.sin(t*0.18+i*2.1))+ (i-1)*W*0.12;
    const cy=H*(0.4+0.25*Math.cos(t*0.13+i*1.7));
    const r=Math.min(W,H)*(0.32+0.06*Math.sin(t*0.5+i));
    const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    const col=i===2?'255,91,127':'127,227,212';
    rg.addColorStop(0,'rgba('+col+','+(0.10+loud*0.12).toFixed(3)+')'); rg.addColorStop(1,'rgba('+col+',0)');
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
  // floating dust motes
  ctx.save(); ctx.globalCompositeOperation='screen';
  for(let i=0;i<60;i++){ const x=(hash(i,7,3)*W+t*8*(0.4+hash(i,2,9)))%W; const y=(hash(i,4,1)*H - t*6)%H; const yy=(y+H)%H; const a=0.10+0.25*hash(i,5,6); ctx.fillStyle='rgba(244,217,160,'+a.toFixed(2)+')'; ctx.fillRect(x,yy,2,2);}
  ctx.restore();
  // chroma-shift edge bleed — thin magenta/teal fringes at the frame sides only
  const jitter=(f%180<6)?(hash(f,1,2)*8-4):0;
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.globalAlpha=0.30;
  ctx.fillStyle='rgba(255,91,127,1)'; ctx.fillRect(jitter,0,4,H);
  ctx.fillStyle='rgba(127,227,212,1)'; ctx.fillRect(W-4-jitter,0,4,H);
  ctx.restore();
}
function gradeVhs(f){
  ctx.save();
  // scanlines
  ctx.globalAlpha=0.10; ctx.fillStyle='#000'; for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);
  ctx.restore();
  // head-switching noise band sliding up from the bottom
  ctx.save();
  const band=H - ((f*5)%(H+60));
  ctx.globalAlpha=0.5;
  for(let y=band;y<band+8 && y<H;y++){ if(y<0)continue; for(let x=0;x<W;x+=2){ const v=hash(x,y,f)*255|0; ctx.fillStyle='rgba('+v+','+v+','+v+',0.5)'; ctx.fillRect(x,y,2,1);} }
  ctx.restore();
  // gentle warm cast — soft-light keeps highlights cream without crushing the teal
  ctx.save(); ctx.globalCompositeOperation='soft-light'; ctx.globalAlpha=0.10; ctx.fillStyle='#f4d9a0'; ctx.fillRect(0,0,W,H); ctx.restore();
  // tracking tear flicker
  if(f%150<3){ ctx.save(); ctx.globalAlpha=0.18; ctx.fillStyle='#fff'; const ty=hash(f,9,9)*H; ctx.fillRect(0,ty,W,2); ctx.restore(); }
}

// ---------- pack: lyric-minimal (type-forward, lots of air) ----------
function sceneLyricMin(t,f,loud){
  ctx.fillStyle=PAL_MIN.bg0; ctx.fillRect(0,0,W,H);
  // one large soft accent orb drifting slowly behind the type
  const cx=W*(0.5+0.18*Math.sin(t*0.12));
  const cy=H*(0.5+0.12*Math.cos(t*0.09));
  const r=Math.min(W,H)*(0.42+loud*0.05);
  const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  rg.addColorStop(0,'rgba(233,96,62,'+(0.16+loud*0.10).toFixed(3)+')');
  rg.addColorStop(0.6,'rgba(233,96,62,0.04)');
  rg.addColorStop(1,'rgba(233,96,62,0)');
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.fillStyle=rg; ctx.fillRect(0,0,W,H); ctx.restore();
  // a single thin moving baseline rule (anchors the type, very subtle)
  ctx.save(); ctx.globalAlpha=0.10; ctx.strokeStyle=PAL_MIN.ink; ctx.lineWidth=1;
  const ly=H*0.78; ctx.beginPath(); ctx.moveTo(W*0.12,ly); ctx.lineTo(W*0.88,ly); ctx.stroke(); ctx.restore();
  // sparse drifting dot grid for depth
  ctx.save(); ctx.globalAlpha=0.06; ctx.fillStyle=PAL_MIN.ink;
  const step=Math.max(60,W/22); const off=(t*10)%step;
  for(let x=-step+off;x<W;x+=step) for(let y=-step+off;y<H;y+=step) ctx.fillRect(x,y,2,2);
  ctx.restore();
}
function gradeMin(){ ctx.save(); ctx.globalAlpha=0.05; ctx.fillStyle='#000'; for(let y=0;y<H;y+=5) ctx.fillRect(0,y,W,1); ctx.restore(); }

window.__frame=async function(f,hero){
  const t=f/A.fps, loud=A.loudness[Math.min(f,A.loudness.length-1)]||0;
  const sec=sectionAt(t); const localT=t-sec.start, dur=sec.end-sec.start;
  // hero load
  if(hero){
    let img=heroCache.get(hero.id);
    if(!img){img=new Image();img.src=hero.dataUrl;try{await img.decode();}catch(e){};heroCache.set(hero.id,img);if(heroCache.size>120){const k=heroCache.keys().next().value;heroCache.delete(k);}}
    curHero={img,id:hero.id};
  } else { curHero=null; }
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  const beatPulse=1+loud*0.04;
  if(PACK==='retrowave'){ sceneRetrowave(t,f,loud); gradeRetro(); } else
  if(PACK==='vhs-lofi'){ sceneVhsLofi(t,f,loud); gradeVhs(f); } else
  if(PACK==='lyric-minimal'){ sceneLyricMin(t,f,loud); gradeMin(); } else
  switch(sec.scene){
    case 'intro': {
      if(curHero){const z=lerp(1.18,1.06,clamp(localT/dur,0,1)); drawCover(curHero.img,z*beatPulse,Math.sin(t*0.3)*16,0);} else sceneNeon(t,f,loud);
      grade(loud); fog(loud*0.5);
      break; }
    case 'desk': case 'corridor': case 'filmnoir': {
      if(curHero){const z=(1.05+Math.sin(t*0.18)*0.03)*beatPulse; drawCover(curHero.img,z,Math.sin(t*0.22)*22,Math.cos(t*0.17)*12);} else sceneNeon(t,f,loud);
      if(sec.scene==='filmnoir'){ // moving spotlight
        ctx.save();ctx.globalCompositeOperation='screen';
        const sx=W/2+Math.sin(t*0.7)*W*0.3, g=ctx.createRadialGradient(sx,H*0.4,0,sx,H*0.4,420);
        g.addColorStop(0,'rgba(255,200,120,0.18)');g.addColorStop(1,'rgba(255,200,120,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.restore();
      }
      grade(loud);
      break; }
    case 'neon':   if(curHero) drawCover(curHero.img,(1.05+Math.sin(t*0.18)*0.03)*beatPulse,Math.sin(t*0.22)*18,Math.cos(t*0.17)*10); else sceneNeon(t,f,loud); grade(loud); break;
    case 'vortex': if(curHero) drawCover(curHero.img,(1.05+Math.sin(t*0.2)*0.03)*beatPulse,Math.sin(t*0.25)*16,Math.cos(t*0.2)*10); else sceneVortex(t,f,loud); grade(loud); break;
    case 'bridge': if(curHero) drawCover(curHero.img,(1.05+Math.sin(t*0.16)*0.03)*beatPulse,Math.sin(t*0.2)*16,0); else sceneBridge(t,f,loud); grade(loud); break;
    case 'glitch': {
      if(curHero) drawCover(curHero.img,1.06*beatPulse,0,0); else sceneNeon(t,f,loud);
      sceneGlitchOver(t,f,loud);
      // momentary black on strong onset (fade to black / jump cut)
      if(loud>0.85 && (f%6<2)){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);}
      grade(loud*0.5); break; }
    case 'outro': {
      if(curHero){const z=lerp(1.25,1.85,clamp(localT/dur,0,1)); drawCover(curHero.img,z,0,0);} else sceneNeon(t,f,loud);
      grade(loud);
      break; }
    default: sceneNeon(t,f,loud); grade(loud);
  }

  // ---- post (grain + vignette) ----
  grain(f); vignette();

  // ---- overlays on top (kept crisp above post) ----
  if(sec.scene==='intro'){ drawStudioIntro(t,localT); drawTitle(t,localT,dur); }
  if(sec.scene==='outro') sceneOutroPost(t,f,localT,dur);
  for(const ln of S){ if(t>=ln.start-0.05 && t<=ln.end+0.05) drawLyric(ln,t); }
  if(sec.scene==='outro'){ const fade=clamp((localT-(dur-3))/3,0,1); if(fade>0){ctx.fillStyle=`rgba(0,0,0,${fade})`;ctx.fillRect(0,0,W,H);} }
  return true;
};

window.__setup=async function(payload){
  A=payload.analysis; C=payload.config; S=payload.syncMap;
  if(payload.pack==='retrowave'){ PACK='retrowave'; PAL=PAL_RETRO; }
  else if(payload.pack==='vhs-lofi'){ PACK='vhs-lofi'; PAL=PAL_VHS; }
  else if(payload.pack==='lyric-minimal'){ PACK='lyric-minimal'; PAL=PAL_MIN; }
  if(payload.grade) GRADE=payload.grade;
  if(payload.width){ W=payload.width; H=payload.height; cv.width=W; cv.height=H; }
  try{ await document.fonts.load('100px Anton'); await document.fonts.load('80px Oswald'); await document.fonts.load('80px Archivo'); await document.fonts.ready; }catch(e){}
  // warm a frame
  await window.__frame(0,payload.firstHero||null);
  return true;
};
window.__ready=true;
</script>
